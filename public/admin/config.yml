backend:
  name: git-gateway
  branch: main

site_url: https://poetry.singsongaftermath.com
display_url: https://poetry.singsongaftermath.com
local_backend: true
media_folder: src/assets/images
public_folder: ../../assets/images

collections:
  - name: settings
    label: Site Settings
    delete: false
    editor:
      preview: false
    files:
      - name: general
        label: General Settings
        file: src/data/site-settings.json
        format: json
        fields:
          - { label: Website URL, name: website, widget: string }
          - { label: Browser Tab Text, name: browserTabText, widget: string, required: false, hint: "Shown in the browser tab. Falls back to Site Title if empty." }
          - label: Preview Image (SEO)
            name: previewImage
            widget: object
            required: false
            collapsed: true
            fields:
              - label: Image
                name: src
                widget: image
                required: false
              - { label: Alt Text, name: alt, widget: string, required: false }
          - { label: Site Description, name: description, widget: text }
          - label: Header Nav Links
            name: headerNavLinks
            widget: list
            summary: "{{fields.text}}"
            fields:
              - { label: Text, name: text, widget: string }
              - { label: URL, name: href, widget: string }
          - { label: Site Title, name: title, widget: string, hint: "Displayed next to the avatar" }
          - { label: Subtitle, name: subtitle, widget: string, required: false }
          - label: Avatar
            name: avatar
            widget: object
            required: false
            collapsed: true
            fields:
              - label: Image
                name: src
                widget: image
                required: false
                hint: "Upload an avatar image."
              - { label: Alt Text, name: alt, widget: string, required: false }
          - label: Hero Section
            name: hero
            widget: object
            collapsed: true
            fields:
              - { label: Title, name: title, widget: string, required: false }
              - { label: Text, name: text, widget: text, required: false, hint: "Supports Markdown formatting" }
              - label: Image
                name: image
                widget: object
                required: false
                collapsed: true
                fields:
                  - label: Image
                    name: src
                    widget: image
                    required: false
                    hint: "Upload a hero image."
                  - { label: Alt Text, name: alt, widget: string, required: false }
              - label: Actions
                name: actions
                widget: list
                summary: "{{fields.text}}"
                required: false
                fields:
                  - { label: Text, name: text, widget: string }
                  - { label: URL, name: href, widget: string }
          - label: Footer Nav Links
            name: footerNavLinks
            widget: list
            summary: "{{fields.text}}"
            fields:
              - { label: Text, name: text, widget: string }
              - { label: URL, name: href, widget: string }
          - label: Footer Social Links
            name: socialLinks
            widget: list
            summary: "{{fields.text}}"
            fields:
              - { label: Text, name: text, widget: string }
              - { label: URL, name: href, widget: string }
          - label: Newsletter Subscribe
            name: subscribe
            widget: object
            collapsed: true
            fields:
              - { label: Enabled, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Text, name: text, widget: string, required: false }
              - { label: Form Action URL, name: formAction, widget: string, required: false, hint: "The URL your subscribe form posts to" }
          - { label: Notes Per Page, name: notesPerPage, widget: number, default: 8, value_type: int }
          - { label: Poems Per Page, name: poemsPerPage, widget: number, default: 8, value_type: int }

  - name: poems
    label: Poems
    folder: src/content/poems
    create: true
    slug: "{{slug}}"
    preview_path: "poems/{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, required: false, hint: "A short summary shown in previews and SEO" }
      - { label: Publish Date, name: publishDate, widget: datetime, date_format: "MMM D YYYY", time_format: false }
      - { label: Featured, name: isFeatured, widget: boolean, default: false, hint: "Featured poems will be highlighted on the homepage" }
      - { label: Hidden, name: hidden, widget: boolean, default: false, hint: "Hidden articles won't appear in listings or search engines" }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Categories, name: categories, widget: list, default: [] }
      - label: SEO
        name: seo
        widget: object
        required: false
        collapsed: true
        hint: "Optional — overrides default meta tags"
        fields:
          - { label: SEO Title, name: title, widget: string, required: false }
          - { label: SEO Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: notes
    label: Notes
    folder: src/content/notes
    create: true
    slug: "{{slug}}"
    preview_path: "notes/{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text, required: false, hint: "A short summary shown in previews and SEO" }
      - { label: Publish Date, name: publishDate, widget: datetime, date_format: "MMM D YYYY", time_format: false }
      - { label: Updated Date, name: updatedDate, widget: datetime, date_format: "MMM D YYYY", time_format: false, required: false }
      - { label: Featured, name: isFeatured, widget: boolean, default: false, hint: "Featured notes will be highlighted on the homepage" }
      - { label: Hidden, name: hidden, widget: boolean, default: false, hint: "Hidden articles won't appear in listings or search engines" }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Categories, name: categories, widget: list, default: [] }
      - label: SEO
        name: seo
        widget: object
        required: false
        collapsed: true
        hint: "Optional — overrides default meta tags"
        fields:
          - { label: SEO Title, name: title, widget: string, required: false }
          - { label: SEO Description, name: description, widget: string, required: false }
          - label: SEO Image
            name: image
            widget: object
            required: false
            fields:
              - { label: Image, name: src, widget: image, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: pages
    label: Pages
    folder: src/content/pages
    create: false
    slug: "{{slug}}"
    preview_path: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: SEO
        name: seo
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: SEO Title, name: title, widget: string, required: false }
          - { label: SEO Description, name: description, widget: string, required: false }
          - label: SEO Image
            name: image
            widget: object
            required: false
            fields:
              - { label: Image, name: src, widget: image, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
